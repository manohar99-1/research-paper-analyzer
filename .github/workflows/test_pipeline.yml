name: Test Research Paper Analyzer Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify API key is set
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "ERROR: OPENROUTER_API_KEY secret is empty or not set!"
            exit 1
          else
            echo "API key is set (length: ${#OPENROUTER_API_KEY})"
          fi

      - name: Run pipeline on sample paper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: meta-llama/llama-3.1-8b-instruct:free
        run: python test_paper.py

      - name: Upload research brief as artifact
        uses: actions/upload-artifact@v4
        with:
          name: research-brief
          path: output_brief.json
